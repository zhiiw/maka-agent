name: Oracle evidence audit

on:
  workflow_dispatch:
    inputs:
      previous_release_tag:
        description: Optional Oracle evidence release tag to use instead of the newest registry release
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: oracle-evidence-audit
  cancel-in-progress: false

env:
  HARBOR_VERSION: 0.13.2
  TERMINAL_BENCH_REVISION: d49e28f1e4ddd13d289e85a5f312a66750951932

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_misses: ${{ steps.plan.outputs.has_misses }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - uses: docker/setup-buildx-action@v3
      - run: npm ci
      - run: npm run build:test
      - name: Install pinned Harbor
        run: |
          uv tool install "harbor==${HARBOR_VERSION}"
          uv tool dir --bin >> "$GITHUB_PATH"
      - name: Check out frozen Terminal-Bench 2.1 tasks
        run: |
          git clone --filter=blob:none https://github.com/harbor-framework/terminal-bench-2-1.git "$RUNNER_TEMP/terminal-bench-2-1"
          git -C "$RUNNER_TEMP/terminal-bench-2-1" checkout "$TERMINAL_BENCH_REVISION"
      - name: Download previous registry snapshot
        id: previous
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.previous_release_tag }}
        run: |
          tag="$REQUESTED_TAG"
          if [[ -z "$tag" ]]; then
            tag="$(gh release list --limit 100 --json tagName,createdAt --jq '[.[] | select(.tagName | startswith("oracle-evidence-"))] | sort_by(.createdAt) | last | .tagName // ""')"
          fi
          if [[ -n "$tag" ]]; then
            gh release download "$tag" --pattern oracle-registry.json --output "$RUNNER_TEMP/previous-oracle-registry.json"
            echo "path=$RUNNER_TEMP/previous-oracle-registry.json" >> "$GITHUB_OUTPUT"
          fi
      - name: Plan incremental audit
        id: plan
        run: |
          args=(
            plan
            --tasks-root "$RUNNER_TEMP/terminal-bench-2-1/tasks"
            --out "$RUNNER_TEMP/oracle-plan/plan.json"
            --matrix-out "$RUNNER_TEMP/oracle-plan/matrix.json"
          )
          if [[ -n "${{ steps.previous.outputs.path }}" ]]; then
            args+=(--previous "${{ steps.previous.outputs.path }}")
          fi
          node packages/headless/harbor/run-oracle-registry-audit.mjs "${args[@]}"
          matrix="$(jq -c . "$RUNNER_TEMP/oracle-plan/matrix.json")"
          count="$(jq '.include | length' "$RUNNER_TEMP/oracle-plan/matrix.json")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          [[ "$count" -gt 0 ]] && echo "has_misses=true" >> "$GITHUB_OUTPUT" || echo "has_misses=false" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: oracle-audit-plan
          path: ${{ runner.temp }}/oracle-plan/plan.json
          retention-days: 7

  audit:
    needs: prepare
    if: needs.prepare.outputs.has_misses == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - uses: docker/setup-buildx-action@v3
      - run: npm ci
      - run: npm run build:test
      - name: Install pinned Harbor
        run: |
          uv tool install "harbor==${HARBOR_VERSION}"
          uv tool dir --bin >> "$GITHUB_PATH"
      - name: Check out frozen Terminal-Bench 2.1 tasks
        run: |
          git clone --filter=blob:none https://github.com/harbor-framework/terminal-bench-2-1.git "$RUNNER_TEMP/terminal-bench-2-1"
          git -C "$RUNNER_TEMP/terminal-bench-2-1" checkout "$TERMINAL_BENCH_REVISION"
      - uses: actions/download-artifact@v4
        with:
          name: oracle-audit-plan
          path: ${{ runner.temp }}/oracle-plan
      - name: Audit ${{ matrix.task_id }}
        run: |
          node packages/headless/harbor/run-oracle-registry-audit.mjs task \
            --plan "$RUNNER_TEMP/oracle-plan/plan.json" \
            --tasks-root "$RUNNER_TEMP/terminal-bench-2-1/tasks" \
            --task-id "${{ matrix.task_id }}" \
            --jobs-dir "$RUNNER_TEMP/oracle-jobs" \
            --out "$RUNNER_TEMP/oracle-entry/${{ matrix.task_id }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: oracle-entry-${{ matrix.task_id }}
          path: ${{ runner.temp }}/oracle-entry/${{ matrix.task_id }}.json
          retention-days: 7

  publish:
    needs: [prepare, audit]
    if: always() && needs.prepare.result == 'success' && (needs.audit.result == 'success' || needs.audit.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:test
      - uses: actions/download-artifact@v4
        with:
          name: oracle-audit-plan
          path: ${{ runner.temp }}/oracle-plan
      - uses: actions/download-artifact@v4
        if: needs.prepare.outputs.has_misses == 'true'
        with:
          pattern: oracle-entry-*
          path: ${{ runner.temp }}/oracle-entries
          merge-multiple: true
      - name: Merge immutable evidence
        run: |
          node packages/headless/harbor/run-oracle-registry-audit.mjs merge \
            --plan "$RUNNER_TEMP/oracle-plan/plan.json" \
            --entries-dir "$RUNNER_TEMP/oracle-entries" \
            --out "$RUNNER_TEMP/oracle-release/oracle-registry.json" \
            --evidence-out "$RUNNER_TEMP/oracle-release/oracle-evidence.jsonl"
      - name: Publish append-only registry release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fingerprint="$(jq -r .fingerprint "$RUNNER_TEMP/oracle-release/oracle-registry.json")"
          tag="oracle-evidence-${fingerprint#sha256:}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; refusing to overwrite" >&2
            exit 1
          fi
          gh release create "$tag" \
            "$RUNNER_TEMP/oracle-release/oracle-registry.json" \
            "$RUNNER_TEMP/oracle-release/oracle-evidence.jsonl" \
            --target "$GITHUB_SHA" \
            --title "Oracle evidence ${fingerprint#sha256:}" \
            --notes "Controlled Terminal-Bench 2.1 Oracle audit from workflow run $GITHUB_RUN_ID. Snapshot: $fingerprint" \
            --prerelease \
            --latest=false
          echo "Oracle registry: https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/oracle-registry.json" >> "$GITHUB_STEP_SUMMARY"
          echo "Snapshot fingerprint: $fingerprint" >> "$GITHUB_STEP_SUMMARY"
